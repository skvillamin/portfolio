<!DOCTYPE html>
<html lang="en">
<head>
    <link rel="stylesheet" href="../style.css">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meta</title>
    <script src="../global.js" type="module"></script>
    <script src="https://d3js.org/d3.v7.min.js"></script>
</head>
<body>
    <h1>Meta</h1>
    <h2>Commits by time of day</h2>
    <div id="stats"></div>
    <dl class="files">
    </dl>
    <div id="scrollytelling">
        <div id="scroll-container">
            <div id="spacer"></div>
            <div id="items-container"></div>
        </div>
        <!-- our old scatterplot div -->
        <div id="chart"></div>
    </div>
    <section class="scrolly-section">
        <div class="scrolly-container">
          <div id="file-vis-container" class="vis-container">
            <!-- File visualization will go here -->
            <dl class="files-viz"></dl>
          </div>
          <div id="files-scroll-container" class="scroll-container">
            <div id="files-spacer" class="spacer"></div>
            <div id="files-items-container" class="items-container"></div>
          </div>
        </div>
      </section>
    <script src="main.js"></script>
    <p id="selection-count">No commits selected</p>
    <dl id="language-breakdown" class="stats"></dl>
    <dl id="commit-tooltip" class="info tooltip">
        <dt>Commit</dt>
        <dd>
            <a href="" id="commit-link" target="_blank"></a>
        </dd>
        
        <dt>Date</dt>
        <dd id="commit-date"></dd>
        
        <dt>Time</dt>
        <dd id="commit-time"></dd>
        
        <dt>Author</dt>
        <dd id="commit-author"></dd>
        
        <dt>Lines</dt>
        <dd id="commit-lines"></dd>
    </dl>
</body>
</html>
